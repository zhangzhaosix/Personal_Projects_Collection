<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记分享 · Shine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Shine</a>
      <div class="nav-links">
        <a href="index.html" class="nav-item">首页</a>
        <a href="works.html" class="nav-item">作品</a>
        <a href="notes.html" class="nav-item active">笔记</a>
        <a href="contact.html" class="nav-item">联系</a>
      </div>
    </div>
  </nav>

  <div class="notes-page">
    <!-- 页面头部 Hero -->
    <section class="page-hero fade-in">
      <div class="page-hero-content">
        <h1 class="page-hero-title">笔记分享</h1>
        <p class="page-hero-sub">记录数据分析、AI等学习心得，沉淀方法和经验~</p>

        <!-- 搜索框 -->
        <div class="search-bar" style="margin-top:24px;max-width:400px;">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" class="search-input" id="notesSearchInput" placeholder="搜索笔记标题或关键词..." aria-label="搜索笔记">
        </div>

      </div>
    </section>

    <!-- 笔记内容区 -->
    <div class="notes-layout">
      <div class="notes-main">
        <!-- 精选推荐笔记 -->
        <div id="featuredNoteSection">
          <!-- 由 JS 动态渲染 -->
        </div>

        <!-- 笔记列表 -->
        <div class="notes-grid" id="notesGrid">
          <!-- 由 JS 动态渲染 -->
        </div>

        <!-- 分页器 -->
        <div class="pagination" id="notesPagination">
          <!-- 由 JS 动态渲染 -->
        </div>
      </div>

      <aside class="notes-sidebar">
        <!-- 热门标签 -->
        <div class="sidebar-section" id="sidebarTags">
          <h3 class="sidebar-section-title">热门标签</h3>
          <div class="sidebar-tags">
            <!-- 由 JS 动态渲染 -->
          </div>
        </div>

        <!-- 推荐阅读 -->
        <div class="sidebar-section" id="sidebarReading">
          <h3 class="sidebar-section-title">推荐阅读</h3>
          <div class="sidebar-reading-list">
            <!-- 由 JS 动态渲染 -->
          </div>
        </div>

        <!-- 持续记录 -->
        <div class="sidebar-section">
          <div class="sidebar-keep-card">
            <h3 class="sidebar-keep-title">持续记录，持续成长</h3>
            <p class="sidebar-keep-text">把每一次学习与复盘，沉淀为未来的力量。</p>
          </div>
        </div>

        <div class="sidebar-section sidebar-attribution">
          <h3 class="sidebar-section-title">图标说明</h3>
          <p class="sidebar-attribution-text">
            笔记图标已本地化保存，风格参考
            <a href="https://www.flaticon.com/animated-icons-most-downloaded" target="_blank" rel="noopener">Flaticon Animated Icons</a>。
          </p>
        </div>
      </aside>
    </div>

    <!-- 页脚 -->
    <div class="footer">
      <span>© 2026 Shine ·项目记录成长 | 笔记沉淀思考</span>
    </div>
  </div>

  <!-- 浮动管理按钮 -->
  <button class="fab" id="fabManage" title="管理模式">⚙</button>
  <button class="fab-add" id="fabAdd" title="添加笔记">+</button>
  <button class="back-to-top" id="backToTop" title="Back To Top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <div class="toast-container" id="toastContainer"></div>

  <!-- 密码验证模态框 -->
  <div class="modal-overlay" id="passwordModal">
    <div class="modal-box" style="max-width:380px;">
      <div class="modal-title" style="text-align:center;">管理员登录</div>
      <div class="modal-body">
        <label class="field-label" for="inputLoginEmail">登录邮箱</label>
        <input type="email" class="input-field" id="inputLoginEmail" value="1801327763@qq.com" readonly style="font-size:15px;">
        <label class="field-label" for="inputLoginPassword">登录密码</label>
        <input type="password" class="input-field" id="inputLoginPassword" placeholder="请输入密码" autocomplete="current-password" style="text-align:center;font-size:18px;letter-spacing:4px;">
        <p id="loginError" class="field-error" style="display:none;">登录失败，请检查邮箱 / 密码或 Firebase 配置。</p>
      </div>
      <div class="modal-footer" style="justify-content:center;">
        <button class="btn btn-outline" id="btnPwdCancel">取消</button>
        <button class="btn btn-solid" id="btnPwdConfirm">确认</button>
      </div>
    </div>
  </div>

  <!-- 添加/编辑笔记模态框 -->
  <div class="modal-overlay" id="formModal">
    <div class="modal-box">
      <div class="modal-title" id="formModalTitle">添加笔记</div>
      <div class="modal-body">
        <label class="field-label" for="inputTitle">笔记标题</label>
        <input type="text" class="input-field" id="inputTitle" placeholder="笔记标题" maxlength="100">
        <label class="field-label" for="inputExcerpt">摘要</label>
        <textarea class="input-field" id="inputExcerpt" placeholder="笔记摘要" maxlength="300" rows="3"></textarea>
        <label class="field-label" for="inputUrl">链接</label>
        <input type="text" class="input-field" id="inputUrl" placeholder="相关链接（可选）" maxlength="500">
        <label class="field-label" for="inputTags">标签</label>
        <input type="text" class="input-field" id="inputTags" placeholder="用逗号分隔，例如：数据分析, SQL" maxlength="200">
        <label class="field-label" for="inputCategory">分类</label>
        <input type="text" class="input-field" id="inputCategory" list="noteCategoryOptions" placeholder="分类名称，例如：数据分析" maxlength="50">
        <datalist id="noteCategoryOptions">
          <option value="AI学习"></option>
          <option value="常用文档"></option>
          <option value="数据分析"></option>
          <option value="用户行为"></option>
          <option value="直播"></option>
          <option value="其他"></option>
        </datalist>
        <p class="field-helper">分类会决定默认图标；未命中推荐分类时会自动回退到通用笔记图标。</p>
        <p id="formError" class="field-error" style="display:none;">保存失败，请重试。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btnFormCancel">取消</button>
        <button class="btn btn-solid" id="btnFormSave">保存</button>
      </div>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div class="modal-overlay confirm-overlay" id="confirmModal">
    <div class="modal-box">
      <div class="confirm-text">确定要删除这篇笔记吗？</div>
      <div class="confirm-sub" id="confirmNoteTitle"></div>
      <div class="modal-footer" style="justify-content:center;">
        <button class="btn btn-outline" id="btnConfirmCancel">取消</button>
        <button class="btn btn-danger" id="btnConfirmDelete">删除</button>
      </div>
    </div>
  </div>

  <script src="js/firebase-portfolio.js"></script>
  <script src="js/notes.js"></script>
</body>
</html>
