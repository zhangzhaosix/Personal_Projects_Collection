<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shine · 作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Shine</a>
      <div class="nav-links">
        <a href="index.html" class="nav-item active">首页</a>
        <a href="works.html" class="nav-item">作品</a>
        <a href="notes.html" class="nav-item">笔记</a>
        <a href="contact.html" class="nav-item">联系</a>
      </div>
    </div>
  </nav>

  <div class="home-page">
    <!-- Hero 首屏 -->
    <section class="hero-section fade-in">
      <img src="assets/images/avatar.png" alt="Shine" class="hero-avatar">
      <h1 class="hero-name slide-up">Shine</h1>
      <p class="hero-tagline slide-up" style="animation-delay:0.1s;">
        项目记录成长 | 笔记沉淀思考——个人作品集
      </p>

      <!-- 打字机轮播 -->
      <div class="typewriter-wrapper slide-up" style="animation-delay:0.2s;">
        <span class="typewriter-prefix" aria-hidden="true">
          <svg class="typewriter-prefix-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3 1.2 4.3a4.7 4.7 0 0 0 3.3 3.3L21 12l-4.5 1.4a4.7 4.7 0 0 0-3.3 3.3L12 21l-1.2-4.3a4.7 4.7 0 0 0-3.3-3.3L3 12l4.5-1.4a4.7 4.7 0 0 0 3.3-3.3L12 3Z"/>
          </svg>
        </span>
        <span class="typewriter-text" id="typewriterText"></span>
        <span class="typewriter-cursor">|</span>
      </div>
    </section>

    <!-- 精选作品 -->
    <div class="featured-section reveal" id="featuredSection">
      <!-- 由 JS 动态渲染 -->
    </div>

    <!-- 查看全部作品 -->
    <div class="home-section reveal" id="worksLinkSection">
      <div style="text-align:center;">
        <a href="works.html" class="btn btn-outline">查看全部作品 →</a>
      </div>
    </div>

    <!-- 推荐笔记 -->
    <div class="home-section reveal" id="notesSection">
      <!-- 由 JS 动态渲染 -->
    </div>

    <!-- 查看全部笔记 -->
    <div class="home-section reveal" id="notesLinkSection">
      <div style="text-align:center;">
        <a href="notes.html" class="btn btn-outline">查看全部笔记 →</a>
      </div>
    </div>

    <div class="contact-section reveal" id="contactSection">
      <!-- 由 JS 动态渲染 -->
    </div>

    <!-- 页脚 -->
    <div class="footer">
      <span>© 2026 Shine ·项目记录成长 | 笔记沉淀思考</span>
      <span class="visitor-count" id="visitorCount">👥 加载中...</span>
    </div>
  </div>

  <script src="js/firebase-portfolio.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
