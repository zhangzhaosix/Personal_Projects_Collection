<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shine · 作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="home-page">
    <!-- 头像 -->
    <div class="avatar-wrapper fade-in">
      <img src="头像.png" alt="Shine" class="avatar">
    </div>

    <!-- 昵称 -->
    <h1 class="nickname slide-up">Shine</h1>

    <!-- 简介 -->
    <p class="bio slide-up" style="animation-delay:0.1s;">光芒万丈，逐梦前行</p>

    <!-- 打字机轮播 -->
    <div class="typewriter-wrapper slide-up" style="animation-delay:0.2s;">
      <span class="typewriter-prefix">🔥</span>
      <span class="typewriter-text" id="typewriterText"></span>
      <span class="typewriter-cursor">|</span>
    </div>

    <!-- 分类卡片 -->
    <div class="category-grid" id="categoryGrid">
      <!-- 由 JS 动态渲染 -->
    </div>

    <div class="footer">
      <span>© 2026 Shine</span>
      <span class="visitor-count" id="visitorCount">👥 加载中...</span>
    </div>
  </div>

  <script src="js/firebase-portfolio.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
